name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'           # dispara em v1.0, v1.1, v2.0, etc.
  workflow_dispatch:   # permite correr manualmente pelo GitHub

permissions:
  contents: write   # necessário para criar releases e fazer upload de ficheiros

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install pywebview psutil pyinstaller pynvml

      - name: Build .exe
        run: |
          pyinstaller pc_optimizer.spec --clean --noconfirm

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCOptimizer-Windows
          path: dist/PCOptimizer.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PC Optimizer ${{ github.ref_name }}"
          body: |
            ## ⬇️ Download
            Baixe o **PCOptimizer.exe** abaixo e execute diretamente — não precisa instalar nada.

            **Requisitos:** Windows 10 ou superior · WebView2 já incluído no Windows 11.

            ---

            ### ✅ Segurança
            Este ficheiro é gerado automaticamente pelo GitHub Actions a partir do código fonte público neste repositório.
            Alguns antivírus podem mostrar um aviso falso (falso positivo) devido ao empacotamento PyInstaller — o código é 100% open source e auditável.

            > Se o seu antivírus bloquear, adicione uma excepção ou compile você mesmo com `build_windows.bat`.
          files: dist/PCOptimizer.exe
          make_latest: true
